name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: macOS shell tests
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show tool versions
        run: |
          bash --version
          jq --version
          plutil -help >/dev/null

      - name: Run verification
        run: make verify
